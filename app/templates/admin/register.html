<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация админа</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-md w-96">
            <h1 class="text-2xl font-bold mb-6 text-center">Регистрация администратора</h1>

            {% if error %}
            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
                {{ error }}
            </div>
            {% endif %}

            <form method="post">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Имя пользователя</label>
                    <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700"
                           name="username" type="text" required>
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Email</label>
                    <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700"
                           name="email" type="email" required>
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Пароль</label>
                    <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700"
                           name="password" type="password" required>
                </div>

                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Код администратора</label>
                    <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700"
                           name="admin_code" type="password" required>
                </div>

                <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded w-full"
                        type="submit">
                    Зарегистрироваться
                </button>
            </form>

            <p class="text-center mt-4 text-sm text-gray-600">
                Уже есть аккаунт? <a href="/admin/login" class="text-blue-500">Войти</a>
            </p>
        </div>
    </div>
</body>
</html>

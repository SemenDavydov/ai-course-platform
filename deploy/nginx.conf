server {
    listen 80;
    server_name davydovaai.ru www.davydovaai.ru;

    # Redirect www to non-www
    if ($host = www.davydovaai.ru) {
        return 301 https://davydovaai.ru$request_uri;
    }

    # Redirect HTTP to HTTPS (раскомментируй после получения SSL)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location /static/ {
        alias /root/ai-course-platform/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

